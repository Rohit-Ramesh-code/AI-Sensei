<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #4a90e2; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 4px;
      color: #c0392b;
      font-size: 0.85rem;
      padding: 8px 10px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sentinel Login</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" autofocus required />
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>

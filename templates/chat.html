<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }
    #messages {
      height: 450px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .message {
      margin-bottom: 10px;
    }
    .message .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .message.user .label { color: #4a90e2; }
    .message.response .label { color: #27ae60; }
    .message pre {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 0.82rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user pre {
      background: #eef4ff;
      border-color: #c5d9f5;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 9px 12px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }
    #input:focus { border-color: #4a90e2; }
    button {
      padding: 9px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    button:disabled { background: #aac4e8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sentinel Chat</h1>
    <div id="messages"></div>
    <div class="input-row">
      <input id="input" type="text" placeholder="Ask about toner status, alerts, or run a check..." autocomplete="off" />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Sentinel';
      const pre = document.createElement('pre');
      pre.textContent = text;
      div.appendChild(label);
      div.appendChild(pre);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      appendMessage('user', message);
      inputEl.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message }),
        });
        const json = await res.json();
        appendMessage('response', JSON.stringify(json, null, 2));
      } catch (err) {
        appendMessage('response', 'Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
